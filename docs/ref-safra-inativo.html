<div class="bg-secondary rounded-[28px] clay-panel-border p-[8px]">
<!-- Inner Burlap/Cream Panel (Surface) -->
<div class="bg-surface-container rounded-[20px] p-8 flex flex-col items-center text-center shadow-inner relative overflow-hidden">

<div class="absolute top-0 left-0 right-0 h-16 inner-gloss pointer-events-none rounded-t-[20px]"></div>
<!-- Hero Icon Placeholder -->
<div class="w-48 h-48 mb-6 relative group animate-[bounce_3s_infinite_ease-in-out]">

<p class="font-body-lg text-on-surface-variant leading-snug px-2">
                            Vá para a <strong class="text-secondary font-bold">Fazenda</strong> e colha um talhão formado no período (mai-ago).
                        </p>
